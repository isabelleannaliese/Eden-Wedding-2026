<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Photos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(to bottom right, #f8f1ea, #ffffff);
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
    }

    input {
      padding: 14px;
      width: 250px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 20px;
      font-size: 1rem;
    }

    button {
      padding: 14px 24px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #c89b6d;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .photo-button {
      display: inline-block;
      margin-top: 30px;
      padding: 18px 32px;
      background: #c89b6d;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="login">
    <h1>Isabelle & Erich</h1>

    <p>Please enter the wedding password</p>

    <input
      type="password"
      id="password"
      placeholder="Password">

    <br>

    <button onclick="checkPassword()">
      Enter
    </button>
  </div>

  <div id="content" class="hidden">

    <h1>Welcome!</h1>

    <p>
      Thank you for celebrating with us.
    </p>

    <a
      class="photo-button"
      href="https://photos.app.goo.gl/r2ykVTHy1N6TSs356"
      target="_blank">

      Upload & View Photos

    </a>

  </div>

</div>

<script>

function checkPassword() {

  const correctPassword = "Erich&Isabelle";

  const enteredPassword =
    document.getElementById("password").value;

  if (enteredPassword === correctPassword) {

    document.getElementById("login")
      .classList.add("hidden");

    document.getElementById("content")
      .classList.remove("hidden");

  } else {

    alert("Incorrect password");

  }
}

</script>

</body>
</html>
