<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Photos</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #f8f1ea, #ffffff);
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
    }

    .photo-button {
      display: inline-block;
      margin-top: 20px;
      padding: 18px 32px;
      background: #c89b6d;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .photo-button:hover {
      background: #b3865d;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Isabelle & Erich</h1>

    <p>
      Thank you for celebrating with us!
      <br>
      Please share your favorite moments from our wedding day.
    </p>

    <a
      class="photo-button"
      href="https://photos.app.goo.gl/r2ykVTHy1N6TSs356"
      target="_blank">

      Upload & View Photos

    </a>

  </div>

</body>
</html>
